<div class="app-layout" [class.sidebar-collapsed]="isCollapsed()">
  <aside class="sidebar glass-panel" [class.collapsed]="isCollapsed()">
    <div class="sidebar-header">
      <div class="brand">
        <img src="spwf.png" alt="SparrowFi Logo" class="app-logo">
        <h2 class="brand-name">Sparrow<span>Fi</span></h2>
      </div>
      <button class="toggle-btn" (click)="toggleSidebar()" [title]="isCollapsed() ? 'Expand menu' : 'Collapse menu'">
        <span>{{ isCollapsed() ? '›' : '‹' }}</span>
      </button>
    </div>

    <nav class="sidebar-nav">
      <a routerLink="/dashboard" routerLinkActive="active" class="nav-item" [title]="isCollapsed() ? 'Dashboard' : ''">
        <span class="icon">📊</span>
        <span class="label">Dashboard</span>
      </a>
      <a routerLink="/transaction" routerLinkActive="active" class="nav-item"
        [title]="isCollapsed() ? 'Transactions' : ''">
        <span class="icon">💸</span>
        <span class="label">Transactions</span>
      </a>
      <a routerLink="/bank" routerLinkActive="active" class="nav-item" [title]="isCollapsed() ? 'Banks' : ''">
        <span class="icon">🏦</span>
        <span class="label">Banks</span>
      </a>
      <a routerLink="/wallet" routerLinkActive="active" class="nav-item" [title]="isCollapsed() ? 'Wallets' : ''">
        <span class="icon">👛</span>
        <span class="label">Wallets</span>
      </a>
      <a routerLink="/card" routerLinkActive="active" class="nav-item"
        [title]="isCollapsed() ? 'Cards' : ''">
        <span class="icon">💳</span>
        <span class="label">Cards</span>
      </a>
      <a routerLink="/category" routerLinkActive="active" class="nav-item" [title]="isCollapsed() ? 'Categories' : ''">
        <span class="icon">🏷️</span>
        <span class="label">Categories</span>
      </a>
      <a routerLink="/fixed-deposit" routerLinkActive="active" class="nav-item" [title]="isCollapsed() ? 'Fixed Deposit' : ''">
        <span class="icon">🔒</span>
        <span class="label">Fixed Deposit</span>
      </a>
      <a routerLink="/monthly-recurring" routerLinkActive="active" class="nav-item" [title]="isCollapsed() ? 'Monthly Recurring' : ''">
        <span class="icon">🔁</span>
        <span class="label">Monthly Recurring</span>
      </a>
      <a routerLink="/report" routerLinkActive="active" class="nav-item" [title]="isCollapsed() ? 'Reports' : ''">
        <span class="icon">📈</span>
        <span class="label">Reports</span>
      </a>
      <a routerLink="/settings" routerLinkActive="active" class="nav-item" [title]="isCollapsed() ? 'Settings' : ''">
        <span class="icon">⚙️</span>
        <span class="label">Settings</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <button class="btn-secondary export-btn" (click)="exportData()"
        [class.dirty]="stateService.isDirty()"
        [title]="isCollapsed() ? 'Export ' + exportLabel() : ''">
        <span class="icon">💾</span>
        <span class="label">Export {{ exportLabel() }}</span>
        <span class="unsaved-badge" *ngIf="stateService.isDirty() && !isCollapsed()">Unsaved</span>
      </button>
      <button class="btn-outline" (click)="logout()" [title]="isCollapsed() ? 'Logout' : ''">
        <span class="icon">🚪</span>
        <span class="label">Logout</span>
      </button>
    </div>
  </aside>

  <main class="main-content">
    <router-outlet></router-outlet>
  </main>

  <!-- Premium Logout Confirmation Modal -->
  <div class="modal-overlay" *ngIf="showLogoutModal()" (click)="cancelLogout()">
    <div class="modal-content glass-card shadow-lg" (click)="$event.stopPropagation()">
      <div class="modal-header-icon">⚠️</div>
      <h2>Unsaved Changes</h2>
      <p>You have unsaved changes. Would you like to export and backup your work before logging out?</p>
      
      <div class="modal-actions-3way">
        <button class="btn-modal btn-save" (click)="saveAndLogout()">
          <span class="icon">💾</span> Save & Logout
        </button>
        <button class="btn-modal btn-discard" (click)="discardAndLogout()">
          <span class="icon">🗑️</span> Discard & Logout
        </button>
        <button class="btn-modal btn-cancel" (click)="cancelLogout()">
          Cancel
        </button>
      </div>
    </div>
  </div>
</div>
